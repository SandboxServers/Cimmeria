services:
  postgres:
    image: postgres:17-alpine
    container_name: cimmeria-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: w-testing
      POSTGRES_PASSWORD: w-testing
      POSTGRES_DB: sgw
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U w-testing -d sgw"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
